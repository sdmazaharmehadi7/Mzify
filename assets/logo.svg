<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" width="200" height="56" role="img" aria-label="Muzify">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Icon Mark: Circle with sound wave bars -->
  <circle cx="28" cy="28" r="26" fill="url(#grad)"/>

  <!-- Equalizer bars inside circle -->
  <rect x="14" y="22" width="4" height="12" rx="2" fill="white" opacity="0.95"/>
  <rect x="21" y="16" width="4" height="24" rx="2" fill="white" opacity="0.95"/>
  <rect x="28" y="20" width="4" height="16" rx="2" fill="white" opacity="0.95"/>
  <rect x="35" y="12" width="4" height="32" rx="2" fill="white" opacity="0.95"/>
  <rect x="42" y="18" width="4" height="20" rx="2" fill="white" opacity="0.95"/>

  <!-- Wordmark: Muzify -->
  <text
    x="66"
    y="36"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="26"
    letter-spacing="-0.5"
    fill="url(#textGrad)"
  >Muzify</text>
</svg>
