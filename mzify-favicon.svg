<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Mzify Icon">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>

  <!-- M letter formed by two arcs / peaks (stylized music note M) -->
  <path
    d="M18 72 L18 30 L33 55 L50 30 L67 55 L82 30 L82 72"
    stroke="white"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Underline accent bar -->
  <rect x="18" y="79" width="64" height="5" rx="2.5" fill="white" opacity="0.5"/>
</svg>
